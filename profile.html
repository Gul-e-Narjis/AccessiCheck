<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Profile — AccessiCheck</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--teal-light); min-height: 100vh; }

    .profile-header {
      background: var(--teal-dark);
      padding: 0 40px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    /* Hero */
    .profile-hero {
      background: linear-gradient(160deg, var(--teal-dark) 0%, var(--teal-primary) 100%);
      padding: 48px 40px 100px;
      position: relative;
      overflow: hidden;
      text-align: center;
    }

    .profile-hero::before {
      content: ""; position: absolute;
      width: 300px; height: 300px; border-radius: 50%;
      background: var(--accent-coral); opacity: 0.08;
      top: -100px; right: -80px;
    }

    .profile-hero::after {
      content: ""; position: absolute;
      width: 200px; height: 200px; border-radius: 50%;
      background: var(--accent-gold); opacity: 0.08;
      bottom: -60px; left: -60px;
    }

    /* Avatar */
    .profile-avatar-wrap {
      position: relative;
      display: inline-block;
      margin-bottom: 16px;
      z-index: 1;
    }

    .profile-avatar {
      width: 96px; height: 96px;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(255,255,255,0.25), rgba(255,255,255,0.1));
      border: 3px solid rgba(255,255,255,0.4);
      display: flex; align-items: center; justify-content: center;
      font-size: 2.4rem;
      font-weight: 800;
      color: white;
      margin: 0 auto;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
      animation: avatarIn 0.5s ease;
    }

    @keyframes avatarIn {
      from { transform: scale(0.8); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    .profile-avatar-badge {
      position: absolute;
      bottom: 2px; right: 2px;
      width: 28px; height: 28px;
      border-radius: 50%;
      background: var(--accent-gold);
      border: 2px solid white;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.75rem;
    }

    .profile-hero h1 {
      color: white;
      font-size: 1.6rem;
      font-weight: 800;
      margin-bottom: 4px;
      position: relative; z-index: 1;
      animation: fadeUp 0.4s ease 0.1s both;
    }

    .profile-hero-email {
      color: rgba(255,255,255,0.7);
      font-size: 0.9rem;
      position: relative; z-index: 1;
      animation: fadeUp 0.4s ease 0.2s both;
    }

    .profile-hero-tag {
      display: inline-block;
      margin-top: 10px;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.85);
      font-size: 0.78rem;
      font-weight: 600;
      padding: 4px 12px;
      border-radius: 999px;
      position: relative; z-index: 1;
      animation: fadeUp 0.4s ease 0.3s both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Main */
    .profile-main {
      max-width: 800px;
      margin: -52px auto 60px;
      padding: 0 24px;
      position: relative; z-index: 2;
    }

    /* Stats */
    .profile-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-bottom: 20px;
    }

    .profile-stat {
      background: white;
      border-radius: 14px;
      padding: 20px 16px;
      text-align: center;
      box-shadow: 0 4px 20px rgba(0,0,0,0.07);
      border-top: 4px solid var(--teal-primary);
      animation: fadeUp 0.4s ease both;
      transition: transform 0.2s ease;
    }

    .profile-stat:hover { transform: translateY(-3px); }
    .profile-stat:nth-child(1) { animation-delay: 0.1s; }
    .profile-stat:nth-child(2) { animation-delay: 0.2s; border-top-color: var(--accent-coral-deep); }
    .profile-stat:nth-child(3) { animation-delay: 0.3s; border-top-color: var(--accent-gold-deep); }

    .profile-stat-num {
      font-size: 2rem;
      font-weight: 800;
      color: var(--teal-dark);
      display: block;
      margin-bottom: 4px;
    }

    .profile-stat:nth-child(2) .profile-stat-num { color: var(--accent-coral-deep); }
    .profile-stat:nth-child(3) .profile-stat-num { color: var(--accent-gold-deep); }

    .profile-stat-label {
      font-size: 0.78rem;
      color: var(--text-light);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    /* Cards */
    .profile-card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.07);
      overflow: hidden;
      margin-bottom: 16px;
      animation: fadeUp 0.4s ease 0.3s both;
    }

    .profile-card-header {
      padding: 16px 24px;
      background: var(--teal-light);
      border-bottom: 1px solid #d0e8e6;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .profile-card-header h2 {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--teal-dark);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .profile-info-row {
      padding: 16px 24px;
      border-bottom: 1px solid #f0f7f6;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .profile-info-row:last-child { border-bottom: none; }

    .profile-info-icon {
      width: 36px; height: 36px;
      border-radius: 8px;
      background: var(--teal-light);
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem;
      flex-shrink: 0;
    }

    .profile-info-label {
      font-size: 0.75rem;
      color: var(--text-light);
      margin-bottom: 2px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .profile-info-value {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text-dark);
    }

    /* Recent scans */
    .recent-scan-item {
      padding: 14px 24px;
      border-bottom: 1px solid #f0f7f6;
      display: flex;
      align-items: center;
      gap: 14px;
      transition: background 0.15s;
      cursor: pointer;
    }

    .recent-scan-item:hover { background: var(--teal-light); }
    .recent-scan-item:last-child { border-bottom: none; }

    .recent-score {
      width: 44px; height: 44px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.88rem;
      font-weight: 800;
      color: white;
      flex-shrink: 0;
    }

    .recent-score.good { background: var(--teal-primary); }
    .recent-score.moderate { background: var(--severity-moderate); }
    .recent-score.poor { background: var(--severity-high); }

    .recent-url {
      flex: 1;
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--text-dark);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .recent-date {
      font-size: 0.75rem;
      color: var(--text-light);
      flex-shrink: 0;
    }

    /* Actions */
    .profile-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    .btn-outline-danger {
      background: white;
      color: var(--accent-coral-deep);
      border: 2px solid var(--accent-coral-deep);
      padding: 10px 20px;
      border-radius: 8px;
      font-weight: 700;
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.15s;
      font-family: inherit;
    }

    .btn-outline-danger:hover {
      background: var(--accent-coral-deep);
      color: white;
    }

    .loading-state {
      text-align: center;
      padding: 40px;
      color: var(--text-light);
    }

    .spinner {
      width: 36px; height: 36px;
      border: 4px solid var(--teal-light);
      border-top: 4px solid var(--teal-primary);
      border-radius: 50%;
      margin: 0 auto 12px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 640px) {
      .profile-stats { grid-template-columns: 1fr; }
      .profile-main { padding: 0 16px; }
      .profile-header { padding: 0 20px; }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="profile-header">
    <span class="logo">♿ AccessiCheck</span>
    <div style="display:flex;align-items:center;gap:16px;">
      <a href="index.html" class="header-link">🏠 Home</a>
      <a href="history.html" class="header-link">📋 History</a>
      <button onclick="logout()" class="header-link" style="background:none;border:none;cursor:pointer;color:white;font-weight:600;">Logout</button>
    </div>
  </header>

  <!-- Hero -->
  <div class="profile-hero">
    <div class="profile-avatar-wrap">
      <div class="profile-avatar" id="avatarEl">?</div>
      <div class="profile-avatar-badge">⭐</div>
    </div>
    <h1 id="heroName">Loading...</h1>
    <p class="profile-hero-email" id="heroEmail">—</p>
    <span class="profile-hero-tag">♿ Accessibility Champion</span>
  </div>

  <!-- Main -->
  <div class="profile-main">

    <!-- Stats -->
    <div class="profile-stats">
      <div class="profile-stat">
        <span class="profile-stat-num" id="totalScans">—</span>
        <span class="profile-stat-label">Total Scans</span>
      </div>
      <div class="profile-stat">
        <span class="profile-stat-num" id="avgScore">—</span>
        <span class="profile-stat-label">Avg Score</span>
      </div>
      <div class="profile-stat">
        <span class="profile-stat-num" id="memberSince">—</span>
        <span class="profile-stat-label">Member Since</span>
      </div>
    </div>

    <!-- Account Info -->
    <div class="profile-card">
      <div class="profile-card-header">
        <h2>👤 Account Information</h2>
      </div>
      <div class="profile-info-row">
        <div class="profile-info-icon">✏️</div>
        <div>
          <div class="profile-info-label">Full Name</div>
          <div class="profile-info-value" id="infoName">—</div>
        </div>
      </div>
      <div class="profile-info-row">
        <div class="profile-info-icon">📧</div>
        <div>
          <div class="profile-info-label">Email Address</div>
          <div class="profile-info-value" id="infoEmail">—</div>
        </div>
      </div>
      <div class="profile-info-row">
        <div class="profile-info-icon">📅</div>
        <div>
          <div class="profile-info-label">Member Since</div>
          <div class="profile-info-value" id="infoCreated">—</div>
        </div>
      </div>
      <div class="profile-info-row">
        <div class="profile-info-icon">🔒</div>
        <div>
          <div class="profile-info-label">Password</div>
          <div class="profile-info-value">••••••••</div>
        </div>
      </div>
    </div>

    <!-- Recent Scans -->
    <div class="profile-card">
      <div class="profile-card-header">
        <h2>🕐 Recent Scans</h2>
        <a href="history.html" style="color:var(--teal-primary);font-size:0.85rem;font-weight:700;text-decoration:none;">View All →</a>
      </div>
      <div id="recentScans">
        <div class="loading-state">
          <div class="spinner"></div>
          <p>Loading...</p>
        </div>
      </div>
    </div>

    <!-- Actions -->
    <div class="profile-actions">
      <a href="history.html" class="btn-primary" style="text-decoration:none;display:inline-block;padding:10px 22px;border-radius:8px;font-size:0.9rem;">📋 View Full History</a>
      <a href="index.html" class="btn-secondary" style="display:inline-block;padding:10px 22px;border-radius:8px;font-size:0.9rem;">🔍 New Scan</a>
      <button class="btn-outline-danger" onclick="logout()">🚪 Logout</button>
    </div>

  </div>

  <script>
    const API_BASE = 'http://localhost:5000/api';
    const token = localStorage.getItem('ac_token');
    const user = JSON.parse(localStorage.getItem('ac_user') || 'null');

    if (!token) window.location.href = 'login.html';

    function logout() {
      localStorage.removeItem('ac_token');
      localStorage.removeItem('ac_user');
      window.location.href = 'login.html';
    }

    function getScoreClass(score) {
      if (score >= 80) return 'good';
      if (score >= 50) return 'moderate';
      return 'poor';
    }

    function formatDate(dateStr) {
      return new Date(dateStr).toLocaleDateString('en-PK', {
        day: 'numeric', month: 'short', year: 'numeric'
      });
    }

    function getInitials(name) {
      return name.split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2);
    }

    async function loadProfile() {
      try {
        const res = await fetch(`${API_BASE}/auth/profile`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        const data = await res.json();
        const { user, stats } = data;

        document.getElementById('avatarEl').textContent = getInitials(user.name);
        document.getElementById('heroName').textContent = user.name;
        document.getElementById('heroEmail').textContent = user.email;
        document.getElementById('totalScans').textContent = stats.totalScans;
        document.getElementById('memberSince').textContent =
          new Date(user.createdAt).toLocaleDateString('en-PK', { month: 'short', year: 'numeric' });

        if (stats.recentScans.length) {
          const avg = Math.round(stats.recentScans.reduce((s, sc) => s + sc.score, 0) / stats.recentScans.length);
          document.getElementById('avgScore').textContent = avg;
        } else {
          document.getElementById('avgScore').textContent = 'N/A';
        }

        document.getElementById('infoName').textContent = user.name;
        document.getElementById('infoEmail').textContent = user.email;
        document.getElementById('infoCreated').textContent = formatDate(user.createdAt);

        const recentEl = document.getElementById('recentScans');
        if (!stats.recentScans.length) {
          recentEl.innerHTML = `<div class="loading-state"><p>No scans yet — <a href="index.html" style="color:var(--teal-primary);font-weight:700;">scan a website!</a></p></div>`;
        } else {
          recentEl.innerHTML = stats.recentScans.map(scan => `
            <div class="recent-scan-item" onclick="window.location.href='history.html'">
              <div class="recent-score ${getScoreClass(scan.score)}">${scan.score}</div>
              <div class="recent-url">${scan.url}</div>
              <div class="recent-date">${formatDate(scan.scanDate)}</div>
            </div>
          `).join('');
        }

      } catch (err) {
        console.error(err);
      }
    }

    loadProfile();
  </script>
</body>
</html>
