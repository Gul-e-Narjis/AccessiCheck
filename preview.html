<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Element Preview | AccessiCheck</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="header-flex">
    <div class="logo">AccessiCheck</div>
  </header>

  <main class="preview-page-wrap">

    <div class="preview-topbar">
      <a href="results.html" class="back-link preview-back">&larr; Back to Results</a>
      <p class="preview-issue-label" id="previewIssueLabel"></p>
    </div>

    <div class="preview-card">
      <div class="preview-card-header">
        <span class="preview-card-icon" aria-hidden="true">📍</span>
        <h1 class="preview-card-title">Element Preview</h1>
        <span class="preview-badge">Read-only</span>
      </div>
      <p class="preview-card-note" id="previewCardNote">Links and forms inside the preview are disabled — this is a diagnostic view only.</p>

      <div class="preview-page-frame-wrap">
        <iframe id="previewFrame" class="preview-page-frame" title="Live preview of the scanned website"></iframe>
      </div>
    </div>

    <div class="results-bottom-links">
      <a href="results.html" class="back-link">&larr; Back to Results</a>
    </div>

  </main>

  <script src="js/preview.js"></script>
</body>
</html>
